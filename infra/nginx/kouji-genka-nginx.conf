# ================================================================
#  kouji-genka (KGK) - nginx 差分設定テンプレート
#
#  目的:
#    Factoryskills (親システム) が稼働する既存の nginx server ブロックに
#    include して、サブパス /kgk/ と /kgk-api/ から KGK バックエンドを
#    リバースプロキシで公開するための location 群を提供する。
#
#  配置例 (Debian/Ubuntu):
#    1) このファイルを `/etc/nginx/snippets/kouji-genka.conf` に配置
#    2) 既存の Factoryskills server ブロック (例: /etc/nginx/sites-available/factoryskills)
#       の server { ... } の中に次の 1 行を追加:
#         include /etc/nginx/snippets/kouji-genka.conf;
#    3) nginx -t で構文確認 → systemctl reload nginx
#
#  パス設計 (ADR-001 を参照):
#    外部 URL                                  → 内部
#    https://factoryskills.example.com/        → 127.0.0.1:8000  (Factoryskills, 既存)
#    https://factoryskills.example.com/kgk/    → 127.0.0.1:3000  (KGK Next.js)
#    https://factoryskills.example.com/kgk-api/<path>
#                                              → 127.0.0.1:3001/api/v1/<path>  (KGK NestJS)
#
#  前提:
#    - Next.js は basePath="/kgk" で build/start されている (NEXT_PUBLIC_BASE_PATH=/kgk)
#    - NestJS は globalPrefix="api/v1" のまま運用される (KGK 既定)
#    - PostgreSQL / Redis は 127.0.0.1 バインドのため nginx からは触れない (host-only)
#    - 既存 Factoryskills の TLS 終端 / server_name / ssl_certificate 等は親 server { }
#      ブロック側でそのまま使う (このファイルは location のみを提供する snippet)
#
#  注意:
#    - 本ファイル単体では server { } を含まないため、parent の server ブロック内に
#      include しないと nginx -t が失敗する。
#    - 親 server で `client_max_body_size` を上げていない場合、Excel/PDF アップロード時に
#      413 になる。KGK の最大想定 (Excel 30MB) を見越して 50M 程度を別途設定すること。
# ================================================================

# ────────────────────────────────────────────────────────────
# Upstream 定義 (snippet で upstream を持つと include 時に重複しがちなので、
# 必要に応じて親 nginx.conf 側に出し、ここでは直接 proxy_pass にホスト:ポートを書く。
# シンプルさを優先して upstream は省略している)
# ────────────────────────────────────────────────────────────


# ────────────────────────────────────────────────────────────
# /kgk/  →  Next.js (port 3000)
#
# basePath=/kgk で build しているため、Next.js は自身が /kgk/ 配下にいることを認識する。
# proxy_pass の末尾に / を付けない (= URI 全体を転送する) ことで /kgk プレフィックスを
# Next.js 側に渡し、basePath とのマッチングが成立する。
# ────────────────────────────────────────────────────────────
location /kgk/ {
    proxy_pass http://127.0.0.1:3000;

    # ── プロキシヘッダ (バックエンドから本来のクライアント情報が見えるように) ──
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # ── HTTP/1.1 + Upgrade (WebSocket / Server Action streaming に必要) ──
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ── streaming / RSC payload を遅延なく流すためバッファ無効化 ──
    proxy_buffering         off;
    proxy_request_buffering off;

    # ── タイムアウト (Next.js の重い ISR 再生成や initial render に余裕) ──
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── リダイレクト書き換え (Next.js が Location: /xxx を返したとき /kgk を付けて返す) ──
    # 通常 basePath で吸収されるが、ベアな redirect を念のためサブパスに寄せる:
    proxy_redirect off;
}

# ────────────────────────────────────────────────────────────
# /kgk-api/<path>  →  NestJS (port 3001) の /api/v1/<path>
#
# NestJS の globalPrefix="api/v1" を変えずに、外部公開パスを /kgk-api/ に揃えるため
# rewrite でプレフィックスを差し替える。
#   例: /kgk-api/auth/login     →  /api/v1/auth/login
#       /kgk-api/projects?limit=10 → /api/v1/projects?limit=10
#
# クエリ文字列は rewrite が自動で保持する。
# ────────────────────────────────────────────────────────────
location /kgk-api/ {
    # /kgk-api/foo/bar → /api/v1/foo/bar
    rewrite ^/kgk-api/(.*)$ /api/v1/$1 break;
    proxy_pass http://127.0.0.1:3001;

    # ── プロキシヘッダ (cookie / session / CORS を正しく通すため) ──
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    # ── Cookie / session 維持 ──
    # express-session の Cookie に Domain 属性を付けていれば nginx 側で書き換え不要。
    # サブパス /kgk-api/ で出した Set-Cookie の Path を / に寄せたい場合:
    # proxy_cookie_path /api/v1 /;

    # ── HTTP/1.1 (Keep-Alive で TCP 確立コスト削減) ──
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── streaming / SSE 用にバッファ無効化 (BullMQ ジョブ進捗を将来 SSE で流す想定) ──
    proxy_buffering off;

    # ── タイムアウト (Excel エクスポート等の長時間 API も視野に) ──
    proxy_connect_timeout 10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── アップロード上限 (location 単位で明示) ──
    # 親 server の client_max_body_size を上書きできる。Excel 30MB を見越して 50M。
    client_max_body_size 50M;
}

# ================================================================
# 補足: $connection_upgrade マップが親 nginx.conf に未定義の場合は
# 以下を /etc/nginx/conf.d/upgrade-map.conf あたりに置くこと:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
#
# 既に Factoryskills 用に定義されていれば不要。
# ================================================================
